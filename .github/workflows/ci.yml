name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint            # ESLint must exit 0
      - run: pnpm type-check      # tsc --noEmit must exit 0
      - run: pnpm test:coverage   # Vitest — 80% floor
      - run: pnpm build           # Production build must succeed
        env:
          SKIP_ENV_VALIDATION: true

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx playwright install --with-deps
      - run: pnpm e2e             # Playwright critical path tests

  deploy-preview:
    needs: quality
    # Gated on repo variable ENABLE_VERCEL_DEPLOY=true. To enable previews:
    #   1. Add secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
    #   2. Add repo variable ENABLE_VERCEL_DEPLOY=true
    # Tracked as P4-INFRA-01 (vercel.json cron also blocks Hobby deploys).
    if: github.event_name == 'pull_request' && vars.ENABLE_VERCEL_DEPLOY == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: npx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
