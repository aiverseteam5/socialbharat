# SocialBharat — Nginx reverse proxy (Hostinger VPS)
# Security headers are owned by next.config.ts; nginx only handles
# TLS termination, compression, static asset serving, and proxy.

server {
    listen 80;
    server_name socialbharat.tynkai.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name socialbharat.tynkai.com;

    ssl_certificate /etc/letsencrypt/live/socialbharat.tynkai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socialbharat.tynkai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Static assets — served directly from the Next.js build output
    location /_next/static/ {
        alias /var/www/socialbharat/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /var/www/socialbharat/public/;
        expires 30d;
    }

    # All other requests proxy to the Next.js standalone server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
